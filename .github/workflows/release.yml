name: Release

on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: macos-latest, target: aarch64-apple-darwin }
          - { os: macos-latest, target: x86_64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
      - run: cargo build --release --locked --target ${{ matrix.target }} -p lune-editor

      - name: Package
        shell: bash
        run: |
          dist="lune-${{ matrix.target }}"
          mkdir "$dist"
          if [ "${{ runner.os }}" = "Windows" ]; then
            cp "target/${{ matrix.target }}/release/lune.exe" "$dist/"
          else
            cp "target/${{ matrix.target }}/release/lune" "$dist/"
          fi
          cp README.md LICENSE "$dist/"
          tar -czf "${dist}.tar.gz" "$dist"

      - uses: softprops/action-gh-release@v2
        with:
          files: lune-${{ matrix.target }}.tar.gz
