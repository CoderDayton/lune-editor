# cargo-deny configuration — https://embarkstudios.github.io/cargo-deny/
# Run locally with: cargo deny check

[advisories]
version = 2
yanked = "deny"
# Transitive advisories we don't control (unmaintained / unsound, not exploitable
# vulnerabilities). Revisit when upstreams update. Real vulnerabilities still fail.
ignore = [
  "RUSTSEC-2025-0141", # bincode unmaintained (via syntect -> tui-markdown)
  "RUSTSEC-2025-0057", # fxhash unmaintained (via rat-focus)
  "RUSTSEC-2024-0384", # instant unmaintained (via notify)
  "RUSTSEC-2024-0320", # yaml-rust unmaintained (via syntect)
  "RUSTSEC-2026-0097", # rand unsound w/ custom-logger rng() — not used that way (via ratatui-image, proptest)
]

[licenses]
version = 2
# Allow-list derived from the actual dependency tree. A new dependency with a
# license outside this set will fail CI until it's reviewed and added here.
allow = [
  "MIT",
  "Apache-2.0",
  "Apache-2.0 WITH LLVM-exception",
  "BSD-2-Clause",
  "BSD-3-Clause",
  "ISC",
  "Zlib",
  "BSL-1.0",
  "MPL-2.0",
  "CC0-1.0",
  "Unlicense",
  "0BSD",
  "WTFPL",
  "Unicode-3.0",
  "Unicode-DFS-2016",
]

[bans]
# Duplicate versions and wildcard deps are surfaced but don't fail CI.
multiple-versions = "warn"
wildcards = "warn"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
